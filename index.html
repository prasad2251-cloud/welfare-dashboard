<!DOCTYPE html>
<html>
<head>
    <title>AP Police Welfare Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🚓 ANDHRA PRADESH POLICE</h1>
    <h2>CHITTOOR DISTRICT POLICE WELFARE DASHBOARD</h2>
</header>

<div class="cards-container">

    <div class="card total">
        <h3>👮 Total Employees</h3>
        <p id="total">0</p>
    </div>

    <div class="card birthday">
        <h3>🎂 Birthdays Today</h3>
        <p id="birthday">0</p>
    </div>

    <div class="card marriage">
        <h3>💍 Marriage Days</h3>
        <p id="marriage">0</p>
    </div>

</div>

<div class="search-box">
    <input type="text" id="search" placeholder="🔍 Search Employee / Police Station">
</div>

<div class="table-container">
    <h2>Employee Welfare Register</h2>

    <div id="dataTable"></div>
</div>

<footer>
    Developed for Chittoor District Police Welfare Dashboard
</footer>

<script src="script.js"></script>

</body>
</html>
