<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Police Welfare Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>🚓 ANDHRA PRADESH POLICE</h1>
        <h2>CHITTOOR DISTRICT POLICE WELFARE DASHBOARD</h2>
    </div>

    <!-- Cards -->
    <div class="cards">

        <div class="card">
            <h3>👮 Total Employees</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>🎂 Birthdays Today</h3>
            <p id="birthday">0</p>
        </div>

        <div class="card">
            <h3>💍 Marriage Days</h3>
            <p id="marriage">0</p>
        </div>

    </div>

    <!-- Search Box -->
    <div class="search-box">
        <input 
            type="text" 
            id="search" 
            placeholder="🔍 Search Employee / Police Station">
    </div>

    <!-- Table Heading -->
    <h2 class="table-title">Employee Welfare Register</h2>

    <!-- Table Data -->
    <div id="dataTable"></div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
